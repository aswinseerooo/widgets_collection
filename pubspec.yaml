name: widgets_collection
description: "A new Flutter project for learning and showcasing various Flutter widgets."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  auto_route: ^11.1.0
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  firebase_ai: ^3.9.0
  firebase_core: ^4.5.0
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  get_it: ^9.2.1
  image_picker: ^1.2.1
  injectable: ^2.7.1+4
  json_annotation: ^4.11.0
  mix: ^1.7.0
  video_player: ^2.11.0

dev_dependencies:
  auto_route_generator: ^10.4.0
  build_runner: ^2.11.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  injectable_generator: ^2.12.0
  json_serializable: ^6.13.0

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  generate: true

  assets:
    - path: lib/presentation/core/assets/images/
